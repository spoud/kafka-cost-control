query metricHistory ($from: DateTimeParameterInput!, $to: DateTimeParameterInput, $metricNames: [String!]!, $groupByContextKeys: [String!]!){
    history(from: $from, to: $to, metricNames: $metricNames, groupByContextKeys: $groupByContextKeys){
        name
        context{
            key
            value
        }
        times
        values
    }
}
