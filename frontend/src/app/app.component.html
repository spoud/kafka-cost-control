<mat-toolbar color="primary">
    <a routerLink="/home" class="mr-1">
        <img ngSrc="assets/spoud.svg" width="53" height="54" alt="Kafka Cost Control Logo" />
    </a>
    <span>COST CONTROL</span>
    <span class="spacer"></span>
    <mat-button-toggle-group
        class="theme-toggle mr-1"
        [value]="themeMode()"
        (change)="setThemeMode($event.value)"
        hideSingleSelectionIndicator
    >
        <mat-button-toggle value="light" matTooltip="Light mode">
            <mat-icon>light_mode</mat-icon>
        </mat-button-toggle>
        <mat-button-toggle value="system" matTooltip="Follow system setting">
            <mat-icon>brightness_auto</mat-icon>
        </mat-button-toggle>
        <mat-button-toggle value="dark" matTooltip="Dark mode">
            <mat-icon>dark_mode</mat-icon>
        </mat-button-toggle>
    </mat-button-toggle-group>
    @if (isAuthenticated()) {
        <button
            mat-button
            class="user-icon"
            aria-label="Logout"
            matTooltip="Sign out"
            (click)="signOut()"
        >
            Sign out
            <mat-icon>logout</mat-icon>
        </button>
    } @else {
        <button
            mat-button
            class="user-icon"
            aria-label="Login"
            matTooltip="Sign in"
            (click)="signIn()"
        >
            Sign in
            <mat-icon>login</mat-icon>
        </button>
    }
</mat-toolbar>

<mat-sidenav-container>
    <mat-sidenav [fixedInViewport]="true" [fixedTopGap]="64" mode="side" opened>
        <mat-nav-list>
            @for (link of navLinksSignal(); track link) {
                <a
                    mat-list-item
                    [routerLink]="link.path"
                    routerLinkActive
                    #rla="routerLinkActive"
                    [activated]="rla.isActive"
                >
                    @if (link.icon) {
                        <mat-icon class="nav-icon">{{ link.icon }}</mat-icon>
                    }
                    {{ link.label }}
                </a>
            }
        </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
        <mat-tab-nav-panel #tabPanel>
            <router-outlet></router-outlet>
        </mat-tab-nav-panel>
    </mat-sidenav-content>
</mat-sidenav-container>
