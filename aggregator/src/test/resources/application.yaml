
quarkus:
  devservices:
    enabled: false
  http:
    test-port: 8280
  kafka-streams:
    state:
      # Randomize folder so we get a clean state every time
      dir: /tmp/kafka-stream-${quarkus.uuid}

cc:
  olap:
    database:
      # Force in-memory DuckDB so tests never inherit a persisted database
      # (and its stale metric names) from the main application config.
      url: "jdbc:duckdb:"
  metrics:
    aggregations:
      confluent_kafka_server_retained_bytes: max
