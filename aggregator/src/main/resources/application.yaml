kafka:
  application:
    id: kafka-cost-control
  bootstrap:
    servers: localhost:9092
  schema:
    registry:
      url: http://localhost:8081

cc:
  olap:
    enabled: false
    database:
      # technically this is already the default, but let's be explicit
      url: "jdbc:duckdb:"
  admin-password: admin
  metrics:
    aggregations:
      confluent_kafka_server_retained_bytes: max
      # The consumption-weight signal is summed within a window like any throughput metric.
      kcc_consumption_weight: sum
#    transformations:
#      # Weighted (fair) split: distribute an authoritative per-topic total among the topic's consumers
#      # proportionally to their measured usage instead of splitting it evenly. See docs/weighted-cost-split.md.
#      # Maps the total metric -> the per-(topic, principal) weight metric that drives the distribution.
#      weightedSplit:
#        confluent_kafka_server_sent_bytes: kcc_consumption_weight       # consumer egress, weighted per reader
#        confluent_kafka_server_received_bytes: kcc_consumption_weight   # producer ingress, weighted per writer
#      config:
#        weightedSplit:
#          # Context key holding the ACL-derived roster of authorized consumers, per total metric.
#          rosterContextKey:
#            confluent_kafka_server_sent_bytes: readers
#            confluent_kafka_server_received_bytes: writers
#          # How authorized-but-non-reporting consumers are treated: MEAN_REPORTER (default) | ZERO | FALLBACK_PRINCIPAL
#          imputation:
#            confluent_kafka_server_sent_bytes: MEAN_REPORTER
  topics:
    pricing-rules: pricing-rules
    context-data: context-data
    aggregated: aggregated
    aggregated-table-friendly: aggregated-table-friendly
    raw-data:
      - metrics-raw-telegraf-env

mp:
  messaging:
    connector:
      smallrye-kafka:
        schema:
          registry:
            url: ${kafka.schema.registry.url}

    outgoing:
      pricing-rules-out:
        connector: smallrye-kafka
        topic: ${cc.topics.pricing-rules}
        apicurio:
          registry:
            auto:
              register: true
      context-data-out:
        connector: smallrye-kafka
        topic: ${cc.topics.context-data}
        apicurio:
          registry:
            auto:
              register: true

avro:
  codegen:
    avsc:
      imports: entity-type-enum.avsc

quarkus:
  kafka-streams:
    application-id: ${kafka.application.id}
    topics: ${cc.topics.raw-data},${cc.topics.context-data},${cc.topics.pricing-rules},${cc.topics.aggregated}
    state:
      dir: /tmp/my-streams
    default:
      key:
        serde: org.apache.kafka.common.serialization.Serdes$StringSerde
      value:
        serde: io.confluent.kafka.streams.serdes.avro.SpecificAvroSerde
  security:
    users:
      embedded:
        enabled: true
        plain-text: true
        users:
          admin: ${cc.admin-password}
        roles:
          admin: ADMIN
  http:
    auth:
      basic: true
  smallrye-graphql:
    schema-include-scalars: true
    error-extension-fields: exception,code,classification
    ui:
      enable: true
      root-path: /graphql-ui
      always-include: true
  log:
    category:
      "io.confluent":
        level: WARN
      "org.apache.kafka":
        level: WARN
      "io.spoud.kcc":
        level: INFO
      "org.jooq.Constants":
        level: WARN
  container-image:
    build: true
