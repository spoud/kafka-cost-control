name: GitHub Pages + Helm Release and Publish

on:
  push:
    branches: [ master ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # important parameter

      - name: asciidoctor-ghpages
        uses: manoelcampos/asciidoctor-ghpages-action@9527ff583929b1000c23c209123bba4e98a21f08 # v2
        with:
          pre_build: |
            mv "docs/" /tmp/source
            mv "helm" /tmp/source/
            #Ignores directories . and .git
            find . -not -path './.git*' -not -name '.' -exec rm -rf {} \; || true
            mv /tmp/source/* .
            # preserve index.yaml
            curl https://spoud.github.io/kafka-cost-control/index.yaml -o index.yaml
            chown -R root:root .
            chmod -R 777 .
            git add .
          pdf_build: true
          asciidoctor_params: -r asciidoctor-diagram
          post_build: 'find . -name "*.svg" | xargs git add -f'
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # important parameter

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f # v1.7.0
        with:
          charts_dir: helm
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
