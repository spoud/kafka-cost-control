name: Build misc

on:
  pull_request:
    branches: [ master ]
    paths:
      - '.github/**'
      - 'helm/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate workflow/dependabot YAML syntax
        run: |
          shopt -s nullglob
          files=(.github/workflows/*.yml .github/workflows/*.yaml .github/dependabot.yml)
          for f in "${files[@]}"; do
            ruby -ryaml -e "YAML.load_file(ARGV[0])" "$f"
            echo "OK: $f"
          done

      - name: Lint Helm chart
        run: helm lint helm/kcc-strimzi
