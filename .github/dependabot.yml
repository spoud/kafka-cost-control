# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/strimzi-operator"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven"
    directory: "/aggregator"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven"
    directory: "/kafka-scraper"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      angular:
        applies-to: version-updates
        patterns:
          - "@angular*"
        update-types:
          - "major"
          - "minor"
          - "patch"
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/confluent-agent"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/kafka-connect"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/aggregator/src/main/docker"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/strimzi-operator/src/main/docker"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker"
    directory: "/kafka-scraper/src/main/docker"
    schedule:
      interval: "weekly"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
